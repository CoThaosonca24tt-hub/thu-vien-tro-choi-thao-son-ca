<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đại Dương Kỳ Diệu</title>
    <style>
        /* Bảng màu Đại dương hoạt hình */
        :root {
            --ocean-top: #48dbfb;
            --ocean-bottom: #0984e3;
            --sand: #ffeaa7;
            --primary: #00cec9;
            --secondary: #fd79a8;
            --accent: #feca57;
            --text-light: #ffffff;
            --text-dark: #2d3436;
            --success: #00b894;
            --error: #ff7675;
            --btn-shadow: 0 8px 0 rgba(0,0,0,0.15);
            --btn-active-shadow: 0 3px 0 rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Baloo 2', 'Nunito', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(180deg, var(--ocean-top) 0%, var(--ocean-bottom) 80%, var(--sand) 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        /* --- Nền Trang Trí Dưới Biển --- */
        .background-decor {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            animation: rise infinite ease-in;
        }

        .coral {
            position: absolute;
            bottom: -10px;
            font-size: 5rem;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.3));
            animation: sway 4s ease-in-out infinite alternate;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        @keyframes sway {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        /* --- Các màn hình --- */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* --- Text & Headers --- */
        h1, h2 {
            text-align: center;
            text-shadow: 0 4px 0px rgba(0,0,0,0.1), 0 0 20px rgba(255,255,255,0.6);
            color: white;
            margin-bottom: 10px;
        }
        h1 { font-size: 3.2rem; line-height: 1.2; -webkit-text-stroke: 2px #0984e3; }
        h2 { font-size: 2rem; color: var(--accent); -webkit-text-stroke: 1.5px #d35400; }
        
        .header {
            position: absolute;
            top: 15px; width: 95%; max-width: 800px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.85);
            padding: 10px 20px; border-radius: 30px;
            border: 4px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
        }

        .progress-bar-container {
            width: 55%; height: 25px;
            background: #dfe6e9; border-radius: 15px;
            overflow: hidden; border: 3px solid #74b9ff;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #00cec9, #81ecec);
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .score-display { font-size: 1.8rem; font-weight: bold; color: var(--secondary); text-shadow: 1px 1px white; }

        /* --- Buttons --- */
        .btn-3d {
            background: linear-gradient(145deg, var(--secondary), #e84393);
            color: white;
            border: 4px solid white;
            padding: 15px 40px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2), var(--btn-shadow);
            text-shadow: 0 2px 2px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            margin: 15px;
        }

        .btn-3d:active {
            transform: translateY(5px);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), var(--btn-active-shadow);
        }

        .btn-play { background: linear-gradient(145deg, #00b894, #55efc4); }

        /* --- Khu vực câu hỏi (Play Area) --- */
        .play-area {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 800px;
            margin-top: 70px;
            flex-grow: 1;
            justify-content: flex-start;
            z-index: 10;
        }

        .question-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 30px;
            border: 4px solid var(--accent);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-align: center;
            max-width: 90%;
        }

        .question-text {
            font-size: 1.8rem;
            color: var(--ocean-bottom);
            font-weight: bold;
        }

        .image-container {
            font-size: 8rem;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 500px;
        }

        .option-btn {
            background: linear-gradient(to bottom, #ffffff, #f1f2f6);
            border: 4px solid var(--primary);
            border-radius: 20px;
            padding: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--ocean-bottom);
            cursor: pointer;
            box-shadow: 0 8px 0 var(--primary), 0 10px 10px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 var(--primary), 0 2px 5px rgba(0,0,0,0.2);
        }

        .option-btn.correct { background: var(--success); color: white; border-color: #009432; box-shadow: 0 8px 0 #009432; }
        .option-btn.wrong { background: var(--error); color: white; border-color: #d63031; box-shadow: 0 8px 0 #d63031; }
        .anim-shake { animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px) rotate(-2deg); }
            40%, 80% { transform: translateX(10px) rotate(2deg); }
        }

        /* --- Hiệu ứng Feedback & Bong bóng / Lấp lánh --- */
        .feedback-overlay {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            text-align: center; z-index: 1000; pointer-events: none;
            opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .feedback-overlay.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .feedback-text {
            font-size: 3rem; font-weight: bold;
            text-shadow: 0 5px 0 rgba(0,0,0,0.2), 0 0 30px rgba(255,255,255,0.9);
            padding: 20px 40px; border-radius: 40px;
            color: white; border: 5px solid white;
            line-height: 1.2; white-space: nowrap;
        }
        .text-praise { background: linear-gradient(45deg, #00cec9, #feca57); }
        .text-encourage { background: linear-gradient(45deg, #fd79a8, #a29bfe); font-size: 2.2rem; }

        /* Lớp hiệu ứng Cá Heo Rơi */
        #effects-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 500; overflow: hidden;
        }

        .falling-dolphin {
            position: absolute;
            top: -10vh;
            font-size: 4.5rem;
            animation: fall-spin 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            filter: drop-shadow(0 5px 15px rgba(255,255,255,0.8));
        }

        @keyframes fall-spin {
            0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; transform: translateY(10vh) rotate(180deg) scale(1.2); }
            80% { opacity: 1; transform: translateY(80vh) rotate(540deg) scale(1); }
            100% { transform: translateY(120vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        .sparkle {
            position: absolute;
            font-size: 2rem;
            animation: pop-sparkle 1s ease-out forwards;
        }
        @keyframes pop-sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2) rotate(180deg); opacity: 0; }
        }

        /* --- Màn hình kết thúc --- */
        .badge {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #feca57, #ff9f43);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            border: 10px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.8);
            margin: 20px auto; position: relative;
            animation: pop-in 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .badge::before { content: "⚓"; font-size: 4rem; position: absolute; top: -30px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }
        .badge-icon { font-size: 6rem; animation: float 3s infinite; }
        @keyframes pop-in { to { opacity: 1; transform: scale(1); } }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .question-text { font-size: 1.4rem; }
            .image-container { font-size: 6rem; margin-bottom: 20px; }
            .option-btn { font-size: 1.4rem; padding: 12px; }
            .feedback-text { font-size: 2rem; padding: 15px 25px; }
        }
    </style>
</head>
<body>

    <!-- Nền Đại Dương -->
    <div class="background-decor" id="bg-decor">
        <!-- JS sẽ tạo bong bóng và san hô ở đây -->
    </div>

    <div id="effects-layer"></div>

    <div id="feedback" class="feedback-overlay">
        <div id="feedback-msg" class="feedback-text"></div>
    </div>

    <!-- Màn hình 1: Bắt đầu -->
    <div id="screen-intro" class="screen active">
        <h1>Đại Dương<br>Kỳ Diệu</h1>
        <div style="font-size: 8rem; animation: float 3s infinite; margin: 20px;">🐬🐢</div>
        <h2>Khám phá biển xanh!</h2>
        <button class="btn-3d btn-play" onclick="startGame()">Bắt Đầu Nào!</button>
    </div>

    <!-- Màn hình 2: Trò chơi -->
    <div id="screen-game" class="screen">
        <div class="header">
            <div class="progress-bar-container"><div id="progress" class="progress-bar"></div></div>
            <div class="score-display">⭐ <span id="score">0</span></div>
        </div>

        <div class="play-area">
            <div class="question-box">
                <div class="question-text" id="question-text">Câu hỏi ở đây?</div>
            </div>
            
            <div class="image-container" id="question-image">🐢</div>
            
            <div class="options-container" id="options-container">
                <!-- Nút đáp án tạo bằng JS -->
            </div>
        </div>
    </div>

    <!-- Màn hình 3: Kết thúc -->
    <div id="screen-end" class="screen">
        <h1>Tuyệt Vời!</h1>
        <div class="badge">
            <div class="badge-icon">🐳</div>
            <div style="font-size: 1.2rem; font-weight: bold; color: #d35400; text-align: center; line-height: 1.1; margin-top: 5px;">
                Nhà Thám Hiểm<br>Đại Dương
            </div>
        </div>
        <div class="score-display" style="font-size: 2.2rem; margin: 20px 0; color: white; -webkit-text-stroke: 1px #0984e3;">
            Tổng Điểm: ⭐ <span id="final-score">100</span>
        </div>
        <button class="btn-3d btn-play" onclick="startGame()">Chơi Lại Nhé!</button>
    </div>

    <script>
        // --- Dữ liệu Trò Chơi (5 câu đố chuẩn xác) ---
        const ALL_QUESTIONS = [
            { text: "Bạn nào đội một ngôi nhà cứng trên lưng?", img: "🐢", options: ["Rùa biển", "Cá voi"], correct: "Rùa biển" },
            { text: "Bạn nào rất thông minh và thích nhảy múa trên sóng?", img: "🐬", options: ["Cá heo", "Sao biển"], correct: "Cá heo" },
            { text: "Bạn nào có tới 8 cái vòi dài xoe tròn?", img: "🐙", options: ["Bạch tuộc", "Sứa"], correct: "Bạch tuộc" },
            { text: "Bạn nào có hai cái càng to và hay bò ngang?", img: "🦀", options: ["Cua", "Ốc"], correct: "Cua" },
            { text: "Bạn nào to lớn nhất đại dương và hay phun nước?", img: "🐳", options: ["Cá voi", "Cá mập"], correct: "Cá voi" }
        ];

        const PRAISE_WORDS = ["Xuất sắc!", "Giỏi lắm!", "Tuyệt vời!", "Con thật thông minh!", "Hoan hô!"];
        const ENCOURAGE_WORDS = ["Không sao đâu!", "Con thử lại nhé!", "Mình sẽ làm được!"];

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnimating = false;
        let gameQuestions = [];

        // --- Web Audio API cho âm thanh ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playTone(freq, type, duration, vol, delay=0) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + delay);
            osc.stop(audioCtx.currentTime + delay + duration);
        }

        function playCorrectSound() {
            // Âm thanh vui nhộn lấp lánh
            playTone(523.25, 'sine', 0.1, 0.4, 0); // C5
            playTone(659.25, 'sine', 0.1, 0.4, 0.1); // E5
            playTone(783.99, 'sine', 0.2, 0.4, 0.2); // G5
            playTone(1046.50, 'sine', 0.4, 0.4, 0.3); // C6
        }

        function playWrongSound() {
            // Âm thanh ếch/kèn báo sai
            playTone(300, 'triangle', 0.2, 0.4, 0);
            playTone(250, 'triangle', 0.4, 0.4, 0.2);
        }

        // --- Rung thiết bị ---
        function vibrateDevice(pattern) {
            if ("vibrate" in navigator) navigator.vibrate(pattern);
        }

        // --- UI & Logic ---
        function createBackgroundDecor() {
            const bg = document.getElementById('bg-decor');
            bg.innerHTML = '';
            
            // Tạo san hô
            const corals = ['🪸', '🌿', '🐚'];
            for(let i=0; i<3; i++) {
                let el = document.createElement('div');
                el.className = 'coral';
                el.innerText = corals[i%corals.length];
                el.style.left = (10 + i * 35) + '%';
                el.style.animationDelay = (i * 1.5) + 's';
                bg.appendChild(el);
            }

            // Tạo bong bóng bay liên tục
            for(let i=0; i<15; i++) {
                let bubble = document.createElement('div');
                bubble.className = 'bubble';
                let size = Math.random() * 20 + 10; // 10-30px
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDuration = (Math.random() * 4 + 4) + 's';
                bubble.style.animationDelay = (Math.random() * 5) + 's';
                bg.appendChild(bubble);
            }
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            currentQuestionIndex = 0;
            score = 0;
            gameQuestions = shuffle([...ALL_QUESTIONS]); // Trộn thứ tự 10 câu
            updateHeader();
            switchScreen('screen-game');
            loadQuestion();
        }

        function updateHeader() {
            document.getElementById('score').innerText = score;
            const percent = (currentQuestionIndex / gameQuestions.length) * 100;
            document.getElementById('progress').style.width = percent + '%';
        }

        function loadQuestion() {
            if (currentQuestionIndex >= gameQuestions.length) {
                endGame();
                return;
            }

            isAnimating = false;
            const q = gameQuestions[currentQuestionIndex];
            
            // Xóa bóng hiệu ứng cũ
            document.getElementById('effects-layer').innerHTML = '';

            // Cập nhật câu hỏi
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('question-image').innerText = q.img;
            
            // Hiển thị nút
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            let mixedOptions = shuffle([...q.options]);
            mixedOptions.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.correct, btn);
                container.appendChild(btn);
            });
            updateHeader();
        }

        function checkAnswer(selected, correct, btn) {
            if (isAnimating) return;
            isAnimating = true;

            const allBtns = document.querySelectorAll('.option-btn');

            if (selected === correct) {
                // ĐÚNG
                score += 10;
                btn.classList.add('correct');
                playCorrectSound();
                vibrateDevice([100, 50, 100]);
                showFeedback('success', PRAISE_WORDS[Math.floor(Math.random() * PRAISE_WORDS.length)]);
                
                // Hiệu ứng bầy cá heo xoay rơi
                createDolphinRain();

                setTimeout(() => {
                    currentQuestionIndex++;
                    loadQuestion();
                }, 3000);
            } else {
                // SAI
                btn.classList.add('wrong', 'anim-shake');
                playWrongSound();
                vibrateDevice(300);
                showFeedback('error', ENCOURAGE_WORDS[Math.floor(Math.random() * ENCOURAGE_WORDS.length)]);

                // Hiện đáp án đúng sau 1 giây
                setTimeout(() => {
                    allBtns.forEach(b => {
                        if (b.innerText === correct) b.classList.add('correct');
                    });
                    
                    setTimeout(() => {
                        currentQuestionIndex++;
                        loadQuestion();
                    }, 2500);
                }, 1000);
            }
        }

        function showFeedback(type, text) {
            const overlay = document.getElementById('feedback');
            const msg = document.getElementById('feedback-msg');
            msg.innerText = text;
            msg.className = 'feedback-text ' + (type === 'success' ? 'text-praise' : 'text-encourage');
            overlay.classList.add('show');
            setTimeout(() => overlay.classList.remove('show'), 2000);
        }

        // --- Hiệu ứng Cơn mưa cá heo nhiều màu & Lấp lánh ---
        function createDolphinRain() {
            const layer = document.getElementById('effects-layer');
            const numDolphins = window.innerWidth > 600 ? 40 : 25; // Điều chỉnh số lượng theo màn hình
            
            // Cá heo rơi
            for (let i = 0; i < numDolphins; i++) {
                let dolphin = document.createElement('div');
                dolphin.className = 'falling-dolphin';
                dolphin.innerText = '🐬';
                dolphin.style.left = Math.random() * 100 + 'vw';
                
                // Thay đổi màu sắc ngẫu nhiên bằng Hue-Rotate (tạo cá heo nhiều màu)
                const hue = Math.floor(Math.random() * 360);
                dolphin.style.filter = `hue-rotate(${hue}deg) drop-shadow(0 5px 10px rgba(0,0,0,0.2))`;
                
                // Random thời gian và độ lớn
                dolphin.style.animationDuration = (Math.random() * 1.5 + 2) + 's';
                dolphin.style.animationDelay = (Math.random() * 0.5) + 's';
                dolphin.style.fontSize = (Math.random() * 3 + 3) + 'rem';
                
                layer.appendChild(dolphin);
            }

            // Hạt lấp lánh (Sparkles)
            for(let i = 0; i < 20; i++) {
                let spark = document.createElement('div');
                spark.className = 'sparkle';
                spark.innerText = '✨';
                spark.style.left = Math.random() * 100 + 'vw';
                spark.style.top = Math.random() * 100 + 'vh';
                spark.style.animationDelay = (Math.random() * 0.5) + 's';
                layer.appendChild(spark);
            }
        }

        function endGame() {
            document.getElementById('final-score').innerText = score;
            switchScreen('screen-end');
            playCorrectSound();
            createDolphinRain();
            vibrateDevice([100, 50, 100, 50, 200]);
        }

        // Khởi tạo đồ hoạ nền khi load
        window.onload = () => {
            createBackgroundDecor();
        };

    </script>
</body>
</html>
