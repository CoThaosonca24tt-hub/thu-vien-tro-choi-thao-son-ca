<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vương Quốc Kẹo Ngọt</title>
    <style>
        /* Bảng màu sắc rực rỡ phong cách Pixar/Kẹo ngọt */
        :root {
            --bg-color: #ff9ff3;
            --primary: #f368e0;
            --secondary: #48dbfb;
            --accent: #feca57;
            --text-light: #ffffff;
            --text-dark: #576574;
            --success: #1dd1a1;
            --error: #ff6b6b;
            --btn-shadow: 0 8px 0 rgba(0,0,0,0.15);
            --btn-active-shadow: 0 3px 0 rgba(0,0,0,0.15);
            --card-shadow: 0 15px 35px rgba(255, 159, 243, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Fredoka One', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(180deg, #c8d6e5 0%, #ff9ff3 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        /* --- Nền Trang Trí (Lâu đài bánh kem & Kẹo) --- */
        .background-decor {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-shape {
            position: absolute;
            opacity: 0.6;
            filter: blur(2px);
            animation: float-bg 6s ease-in-out infinite alternate;
        }

        @keyframes float-bg {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-30px) rotate(10deg); }
        }

        /* --- Màn hình (Screens) --- */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* --- UI Elements Chung --- */
        h1, h2, h3 {
            text-align: center;
            text-shadow: 0 4px 0px rgba(0,0,0,0.1), 0 0 20px rgba(255,255,255,0.8);
            color: white;
            margin-bottom: 15px;
        }

        h1 { font-size: 3.5rem; line-height: 1.2; -webkit-text-stroke: 2px #f368e0; }
        h2 { font-size: 2.5rem; color: var(--accent); -webkit-text-stroke: 1.5px #ff9f43; }
        
        .question-text {
            font-size: 2.2rem;
            color: white;
            background: rgba(255, 107, 107, 0.8);
            padding: 10px 30px;
            border-radius: 50px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            z-index: 20;
        }

        .btn-3d {
            background: linear-gradient(145deg, var(--secondary), #0abde3);
            color: white;
            border: 4px solid white;
            padding: 15px 40px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2), var(--btn-shadow);
            text-shadow: 0 2px 2px rgba(0,0,0,0.3);
            transition: all 0.1s;
            margin: 15px;
            position: relative;
        }

        .btn-3d:active {
            transform: translateY(5px);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), var(--btn-active-shadow);
        }

        .btn-play { background: linear-gradient(145deg, var(--success), #10ac84); }

        /* --- Header & Progress --- */
        .header {
            position: absolute;
            top: 20px; width: 90%; max-width: 800px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.6);
            padding: 10px 20px; border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 20;
        }

        .progress-bar-container {
            width: 60%; height: 25px;
            background: rgba(255,255,255,0.8); border-radius: 15px;
            overflow: hidden; border: 3px solid #f368e0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #feca57, #ff9f43);
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 5px 5px rgba(255,255,255,0.5);
        }

        .score-display { font-size: 1.8rem; font-weight: bold; color: #ff6b6b; text-shadow: 1px 1px white; }

        /* --- Game Area --- */
        .play-area {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 800px;
            margin-top: 80px;
            flex-grow: 1;
            justify-content: center;
            z-index: 10;
        }

        .items-container {
            background: rgba(255, 255, 255, 0.4);
            border: 5px dashed white;
            border-radius: 30px;
            padding: 20px;
            min-height: 250px;
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.8);
        }

        .candy-item {
            font-size: 4rem;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes pop-in {
            to { opacity: 1; transform: scale(1); }
        }

        /* --- Options Area --- */
        .options-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            padding: 0 10px;
        }

        .option-btn {
            background: linear-gradient(to bottom, #ffffff, #f1f2f6);
            border: 5px solid var(--secondary);
            border-radius: 25px;
            width: 100px; height: 100px;
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--primary);
            cursor: pointer;
            box-shadow: 0 10px 0 var(--secondary), 0 15px 15px rgba(0,0,0,0.2);
            transition: all 0.1s;
            display: flex; justify-content: center; align-items: center;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
        }

        .option-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 var(--secondary), 0 5px 5px rgba(0,0,0,0.2);
        }

        .option-btn.correct { background: var(--success); color: white; border-color: #10ac84; box-shadow: 0 10px 0 #10ac84; }
        .option-btn.wrong { background: var(--error); color: white; border-color: #c0392b; box-shadow: 0 10px 0 #c0392b; }

        /* --- Feedback Overlay --- */
        .feedback-overlay {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            text-align: center; z-index: 1000; pointer-events: none;
            opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .feedback-overlay.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .feedback-text {
            font-size: 4rem; font-weight: bold;
            text-shadow: 0 5px 0 rgba(0,0,0,0.2), 0 0 30px rgba(255,255,255,0.9);
            padding: 20px 40px; border-radius: 40px;
            color: white;
            border: 5px solid white;
            line-height: 1.2;
        }
        .text-praise { background: linear-gradient(45deg, #ff9ff3, #feca57); }
        .text-encourage { background: linear-gradient(45deg, #48dbfb, #a29bfe); font-size: 3rem; }

        /* --- Effects Layer (Balloons) --- */
        #effects-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 500; overflow: hidden;
        }

        .floating-balloon {
            position: absolute;
            bottom: -20vh;
            font-size: 4rem;
            animation: flyUp 3s ease-in forwards;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.8));
            opacity: 0.9;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.5) rotate(-10deg); opacity: 0; }
            10% { opacity: 1; transform: translateY(-10vh) scale(1) rotate(10deg); }
            50% { transform: translateY(-60vh) scale(1.2) rotate(-15deg); }
            100% { transform: translateY(-120vh) scale(1.5) rotate(20deg); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px) rotate(-5deg); }
            40%, 80% { transform: translateX(15px) rotate(5deg); }
        }
        .anim-shake { animation: shake 0.5s; }

        /* --- End Screen Badge --- */
        .badge {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #feca57, #ff9f43);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            border: 10px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.8);
            margin: 20px auto;
            position: relative;
            animation: pop-in 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .badge::before {
            content: "👑"; font-size: 4rem; position: absolute; top: -30px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }
        .badge-icon { font-size: 5rem; }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .question-text { font-size: 1.6rem; padding: 10px 20px; }
            .items-container { min-height: 180px; padding: 10px; }
            .candy-item { font-size: 3rem; margin: -5px; }
            .option-btn { width: 80px; height: 80px; font-size: 2.5rem; }
            .feedback-text { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Nền trang trí dễ thương -->
    <div class="background-decor">
        <div class="bg-shape" style="font-size: 6rem; top: 10%; left: 5%;">🧁</div>
        <div class="bg-shape" style="font-size: 5rem; top: 70%; left: 80%; animation-delay: 1s;">🍭</div>
        <div class="bg-shape" style="font-size: 8rem; top: 80%; left: 10%; animation-delay: 2s;">🍩</div>
        <div class="bg-shape" style="font-size: 4rem; top: 20%; left: 70%; animation-delay: 0.5s;">🍬</div>
    </div>

    <!-- Container hiệu ứng bong bóng -->
    <div id="effects-layer"></div>

    <!-- Lớp phủ khen ngợi/Động viên -->
    <div id="feedback" class="feedback-overlay">
        <div id="feedback-msg" class="feedback-text"></div>
    </div>

    <!-- Màn hình 1: Giới thiệu -->
    <div id="screen-intro" class="screen active">
        <h1>Vương Quốc<br>Kẹo Ngọt</h1>
        <h2>Đếm Số Cùng Bé</h2>
        <div style="font-size: 8rem; margin: 10px; animation: float-bg 3s infinite alternate;">🏰</div>
        <button class="btn-3d btn-play" onclick="startGame()">Bắt Đầu Chơi!</button>
    </div>

    <!-- Màn hình 2: Trò chơi chính -->
    <div id="screen-game" class="screen">
        <div class="header">
            <div class="progress-bar-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div class="score-display">⭐ <span id="score">0</span></div>
        </div>

        <div class="play-area">
            <div class="question-text">Có bao nhiêu bạn kẹo nhỉ?</div>
            
            <div id="items-display" class="items-container">
                <!-- Kẹo được tạo bằng JS -->
            </div>
            
            <div id="options-display" class="options-container">
                <!-- Nút chọn đáp án được tạo bằng JS -->
            </div>
        </div>
    </div>

    <!-- Màn hình 3: Kết thúc -->
    <div id="screen-end" class="screen">
        <h1>Tuyệt Vời Quá!</h1>
        <div class="badge">
            <div class="badge-icon">🎓</div>
            <div style="font-size: 1.2rem; font-weight: bold; color: #ff6b6b; text-align: center; line-height: 1.1; margin-top: 5px;">
                Nhà<br>Toán Học<br>Nhí
            </div>
        </div>
        <div class="score-display" style="font-size: 2.5rem; margin: 20px 0; color: white; -webkit-text-stroke: 1px #ff6b6b;">
            Điểm của con: ⭐ <span id="final-score">50</span>
        </div>
        <button class="btn-3d btn-play" onclick="startGame()">Chơi Lại Nhé!</button>
    </div>

    <!-- Web Audio API & Logic -->
    <script>
        // --- Cấu hình trò chơi ---
        const TOTAL_QUESTIONS = 5;
        const ITEMS_EMOJIS = ['🍬', '🍭', '🍩', '🧁', '🍪', '🍦', '🍰', '🍫'];
        const BALLOON_EMOJIS = ['🎈', '💖', '⭐', '✨'];
        
        const PRAISE_WORDS = ["Xuất sắc!", "Con thật giỏi!", "Hoan hô!", "Chính xác!", "Tuyệt lắm!"];
        const ENCOURAGE_WORDS = ["Không sao đâu!", "Con sẽ làm được!", "Mình thử lại nhé!"];

        // --- Trạng thái trò chơi ---
        let currentQuestion = 0;
        let score = 0;
        let isAnimating = false;
        let gameData = [];

        // --- Âm thanh (Sử dụng Web Audio API để không cần file ngoài) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, vol) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            playTone(523.25, 'sine', 0.1, 0.5); // C5
            setTimeout(() => playTone(659.25, 'sine', 0.1, 0.5), 100); // E5
            setTimeout(() => playTone(783.99, 'sine', 0.3, 0.5), 200); // G5
        }

        function playWrongSound() {
            playTone(300, 'triangle', 0.2, 0.5);
            setTimeout(() => playTone(250, 'triangle', 0.4, 0.5), 150);
        }

        // --- Rung thiết bị (Haptic Feedback) ---
        function vibrateDevice(pattern) {
            if ("vibrate" in navigator) {
                navigator.vibrate(pattern);
            }
        }

        // --- UI Elements ---
        const screens = {
            intro: document.getElementById('screen-intro'),
            game: document.getElementById('screen-game'),
            end: document.getElementById('screen-end')
        };
        const itemsDisplay = document.getElementById('items-display');
        const optionsDisplay = document.getElementById('options-display');
        const scoreEl = document.getElementById('score');
        const progressEl = document.getElementById('progress');
        const feedbackOverlay = document.getElementById('feedback');
        const feedbackMsg = document.getElementById('feedback-msg');
        const effectsLayer = document.getElementById('effects-layer');

        // --- Utility Functions ---
        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function shuffleArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // --- Tạo Dữ liệu trò chơi ---
        function generateGameData() {
            gameData = [];
            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                const correctCount = getRandomInt(1, 10);
                const itemEmoji = ITEMS_EMOJIS[Math.floor(Math.random() * ITEMS_EMOJIS.length)];
                
                // Tạo đáp án sai
                let wrongs = new Set();
                while (wrongs.size < 2) {
                    let w = getRandomInt(1, 10);
                    if (w !== correctCount) wrongs.add(w);
                }

                let options = [correctCount, ...Array.from(wrongs)];
                options = shuffleArray(options);

                gameData.push({
                    count: correctCount,
                    item: itemEmoji,
                    options: options
                });
            }
        }

        // --- Luồng Trò chơi ---
        function startGame() {
            // Khởi tạo audio context khi người dùng tương tác (Policy của trình duyệt)
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            currentQuestion = 0;
            score = 0;
            generateGameData();
            updateScore();
            switchScreen('game');
            loadQuestion();
        }

        function updateScore() {
            scoreEl.innerText = score;
            const progress = (currentQuestion / TOTAL_QUESTIONS) * 100;
            progressEl.style.width = `${progress}%`;
        }

        function loadQuestion() {
            if (currentQuestion >= TOTAL_QUESTIONS) {
                endGame();
                return;
            }

            isAnimating = false;
            const data = gameData[currentQuestion];
            
            // Xóa nội dung cũ
            itemsDisplay.innerHTML = '';
            optionsDisplay.innerHTML = '';
            
            // Render Emojis (Kẹo/Bánh)
            for (let i = 0; i < data.count; i++) {
                const item = document.createElement('div');
                item.className = 'candy-item';
                item.innerText = data.item;
                item.style.animationDelay = `${i * 0.05}s`; // Hiệu ứng xuất hiện lần lượt
                itemsDisplay.appendChild(item);
            }

            // Render Các nút đáp án
            data.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(opt, data.count, btn);
                optionsDisplay.appendChild(btn);
            });

            updateScore();
        }

        // --- Xử lý Đáp án ---
        function handleAnswer(selected, correct, btnElement) {
            if (isAnimating) return;
            isAnimating = true;

            const allBtns = document.querySelectorAll('.option-btn');
            
            if (selected === correct) {
                // ĐÚNG
                score += 10;
                btnElement.classList.add('correct');
                playCorrectSound();
                vibrateDevice([100, 50, 100]); // Rung vui nhộn
                
                showFeedback('success', PRAISE_WORDS[Math.floor(Math.random() * PRAISE_WORDS.length)]);
                createBalloonsEffect();

                setTimeout(() => {
                    currentQuestion++;
                    loadQuestion();
                }, 2500);

            } else {
                // SAI
                btnElement.classList.add('wrong', 'anim-shake');
                playWrongSound();
                vibrateDevice(300); // Rung dài cảnh báo
                
                showFeedback('error', ENCOURAGE_WORDS[Math.floor(Math.random() * ENCOURAGE_WORDS.length)]);

                // Vài giây sau hiển thị đáp án đúng
                setTimeout(() => {
                    allBtns.forEach(b => {
                        if (parseInt(b.innerText) === correct) {
                            b.classList.add('correct');
                        }
                    });
                    
                    setTimeout(() => {
                        currentQuestion++;
                        loadQuestion();
                    }, 2000);
                }, 1000);
            }
        }

        // --- Hiển thị Lời Khen/Động viên ---
        function showFeedback(type, text) {
            feedbackMsg.innerText = text;
            feedbackMsg.className = 'feedback-text ' + (type === 'success' ? 'text-praise' : 'text-encourage');
            feedbackOverlay.classList.add('show');
            setTimeout(() => {
                feedbackOverlay.classList.remove('show');
            }, 2000);
        }

        // --- Hiệu ứng Bong bóng bay ngợp trời ---
        function createBalloonsEffect() {
            effectsLayer.innerHTML = ''; // Xóa cũ nếu có
            const totalBalloons = 80; // Hàng trăm bong bóng (giới hạn 80 để mượt)
            
            for (let i = 0; i < totalBalloons; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'floating-balloon';
                balloon.innerText = BALLOON_EMOJIS[Math.floor(Math.random() * BALLOON_EMOJIS.length)];
                
                // Vị trí ngang ngẫu nhiên
                balloon.style.left = `${Math.random() * 100}vw`;
                
                // Thời gian bay và độ trễ ngẫu nhiên
                const duration = Math.random() * 2 + 2; // 2s - 4s
                balloon.style.animationDuration = `${duration}s`;
                balloon.style.animationDelay = `${Math.random() * 0.5}s`;
                
                // Kích thước ngẫu nhiên
                balloon.style.fontSize = `${Math.random() * 2 + 2}rem`;
                
                effectsLayer.appendChild(balloon);
                
                // Tự động xóa element sau khi bay xong
                setTimeout(() => {
                    if (effectsLayer.contains(balloon)) {
                        effectsLayer.removeChild(balloon);
                    }
                }, (duration + 0.5) * 1000);
            }
        }

        // --- Kết thúc ---
        function endGame() {
            document.getElementById('final-score').innerText = score;
            switchScreen('end');
            playCorrectSound();
            createBalloonsEffect(); // Bay bong bóng chúc mừng
            vibrateDevice([100, 50, 100, 50, 200]);
        }

    </script>
</body>
</html>
